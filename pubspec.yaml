name: sakura_chat
description: Professional Japanese Language Learning Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Navigation
  cupertino_icons: ^1.0.6

  device_preview: ^1.2.0

  # State Management
  provider: ^6.1.1

  # Storage & Preferences
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # File Management & Permissions
  permission_handler: ^11.0.1
  share_plus: ^7.2.1

  # Audio & TTS
  audioplayers: ^5.2.1
  flutter_tts: ^3.8.3

  # Network & API
  connectivity_plus: ^5.0.1
  http: ^1.1.0
  dio: ^5.4.0

  flutter_dotenv: ^5.1.0
  encrypt: ^5.0.1


  # Japanese Language Support
  flutter_localizations:
    sdk: flutter

  # UI Enhancements
  animations: ^2.0.8
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Keyboard & Input
  flutter_keyboard_visibility: ^6.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1

  # 3D Effects
  vector_math: ^2.1.4

  # Notifications (for daily reminders)
  flutter_local_notifications: ^19.4.0

  # Optional: AI Integration
  # google_generative_ai: ^0.2.0  # For Gemini API
  # openai_dart: ^1.0.0  # For OpenAI API

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Add your assets here
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/data/

  fonts:
    - family: NotoSansJP
      fonts:
        - asset: fonts/NotoSansJP-Regular.ttf
          weight: 400
        - asset: fonts/NotoSansJP-Medium.ttf
          weight: 500
        - asset: fonts/NotoSansJP-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
          weight: 400
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700